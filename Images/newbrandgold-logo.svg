<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420">
  <defs>
    <!-- Luxury gold -->
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff7c2"/>
      <stop offset="18%" stop-color="#f7e39a"/>
      <stop offset="42%" stop-color="#d4af37"/>
      <stop offset="60%" stop-color="#b8932a"/>
      <stop offset="82%" stop-color="#ffeaa6"/>
      <stop offset="100%" stop-color="#d4af37"/>
    </linearGradient>

    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.0" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Arc path for NEW BRAND -->
    <path id="arcTop" d="M180 130 C 310 40, 590 40, 720 130" />
  </defs>

  <style>
    .g { fill: url(#gold); stroke: none; }
    .s { stroke: url(#gold); fill: none; stroke-linecap: round; stroke-linejoin: round; }
    .small { font: 54px "Times New Roman", Georgia, serif; letter-spacing: 6px; }
    .big   { font: 150px "Times New Roman", Georgia, serif; font-weight: 700; letter-spacing: 2px; }
  </style>

  <g filter="url(#softGlow)">
    <!-- NEW BRAND (arched) -->
    <text class="g small">
      <textPath href="#arcTop" startOffset="50%" text-anchor="middle">NEW BRAND</textPath>
    </text>

    <!-- TOP ORNAMENT (closer to your emblem) -->
    <!-- Outer left curl -->
    <path class="s" stroke-width="7"
          d="M210 175
             C165 175, 160 130, 205 130
             C240 130, 246 160, 223 168
             C208 173, 196 160, 205 150" />
    <!-- Outer right curl (mirror-ish) -->
    <path class="s" stroke-width="7"
          d="M690 175
             C735 175, 740 130, 695 130
             C660 130, 654 160, 677 168
             C692 173, 704 160, 695 150" />

    <!-- Central flourish: small wings + stem -->
    <path class="s" stroke-width="7"
          d="M332 175
             C365 150, 405 152, 450 175
             C495 152, 535 150, 568 175" />
    <path class="s" stroke-width="7"
          d="M450 175
             C450 160, 450 150, 450 140" />
    <!-- Tiny center leaves -->
    <path class="s" stroke-width="6"
          d="M435 160 C440 152, 444 150, 450 150 C456 150, 460 152, 465 160" />

    <!-- GOLD -->
    <text x="450" y="295" text-anchor="middle" class="g big">GOLD</text>

    <!-- BOTTOM ORNAMENT (scroll / infinity style like the bottle) -->
    <!-- Left scroll -->
    <path class="s" stroke-width="7"
          d="M245 325
             C205 325, 185 360, 225 370
             C265 380, 292 335, 325 325
             C355 316, 385 330, 410 350" />
    <!-- Right scroll -->
    <path class="s" stroke-width="7"
          d="M655 325
             C695 325, 715 360, 675 370
             C635 380, 608 335, 575 325
             C545 316, 515 330, 490 350" />

    <!-- Center “infinity” loop -->
    <path class="s" stroke-width="7"
          d="M410 350
             C435 372, 465 372, 490 350
             C515 328, 545 328, 570 350" />
    <path class="s" stroke-width="7"
          d="M490 350
             C465 328, 435 328, 410 350
             C385 372, 355 372, 330 350" />

    <!-- Small center knot -->
    <path class="s" stroke-width="6"
          d="M440 350 C450 340, 460 340, 470 350 C460 360, 450 360, 440 350 Z" />
  </g>
</svg>